<!DOCTYPE html>
<html>
<head>
  <title>Ficha Jugador</title>
</head>
<body>

<h1>Ficha del Jugador</h1>

<p id="nombre">Nombre: ---</p>
<p id="dni">DNI: ---</p>
<p id="carnet">Carnet: ---</p>

<img id="foto" width="150">
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (id) {
  document.getElementById("nombre").textContent = "Jugador ID: " + id;
}
 <script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

alert("ID detectado: " + id);

if (id) {
  document.getElementById("nombre").textContent = "Jugador ID: " + id;
}
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

console.log("ID detectado:", id);

const nombre = document.getElementById("nombre");

if (nombre) {
  nombre.textContent = "Jugador ID: " + id;
} else {
  alert("NO ENCUENTRO EL ELEMENTO 'nombre'");
}
</script>
</body>
</html>
